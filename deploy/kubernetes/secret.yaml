# Create this secret with your actual credentials. Do not commit real values.
# Example: kubectl create secret generic pgquerynarrative-secret -n pgquerynarrative \
#   --from-literal=DATABASE_PASSWORD=xxx \
#   --from-literal=DATABASE_READONLY_PASSWORD=xxx
# Or apply after replacing placeholders (e.g. with envsubst or a CI secret store).
apiVersion: v1
kind: Secret
metadata:
  name: pgquerynarrative-secret
  namespace: pgquerynarrative
  labels:
    app.kubernetes.io/name: pgquerynarrative
type: Opaque
stringData:
  DATABASE_PASSWORD: "changeme"           # replace with app user password
  DATABASE_READONLY_PASSWORD: "changeme" # replace with readonly user password
  # Optional for LLM: LLM_API_KEY, etc.
