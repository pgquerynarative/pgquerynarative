run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gosec

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    # G115: int->int32 conversion; we clamp to math.MaxInt32 where needed, gosec doesn't recognize the pattern
    - linters: [gosec]
      text: "G115"
